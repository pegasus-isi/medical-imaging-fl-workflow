# E6: Improved FL Training — fixes model collapse from E1-E5
# Key changes vs E1:
#   - freeze_backbone: only train classifier head (preserves ImageNet features)
#   - optimizer: adam (adaptive LR per parameter, gentler than SGD)
#   - learning_rate: 0.0001 (100x lower than E1's 0.01)
#   - class_weighted_loss: handles class imbalance
#   - augmentation: regularizes small client shards
#   - grad_clip: stabilizes training
#   - lr_scheduler: cosine warmdown

fl:
  algorithm: "fedavg"
  num_rounds: 50
  local_epochs: 5
  learning_rate: 0.0001
  batch_size: 32
  client_fraction: 1.0
  model_arch: "resnet18"
  fedprox_mu: 0.0
  freeze_backbone: true
  optimizer: "adam"
  class_weighted_loss: true
  augmentation: true
  grad_clip: 1.0
  lr_scheduler: "cosine"

datasets:
  tcia:
    enabled: true
    num_clients: 10
    collections:
      - "NSCLC-Radiomics"
      - "TCGA-LUAD"
      - "LIDC-IDRI"
      - "NSCLC-Radiogenomics"
      - "RIDER-Lung-CT"
    task: "lung_classification"
    image_size: [224, 224]
    num_classes: 2
    test_split: 0.2
    max_series_per_collection: 100
    collection_labels:
      NSCLC-Radiomics: 0
      TCGA-LUAD: 1
      LIDC-IDRI: 0
      NSCLC-Radiogenomics: 1
      RIDER-Lung-CT: 0
    raw_data_path: "/home/ubuntu/medical-imaging-fl-workflow/tcia_raw_data.tar.gz"

  nih:
    enabled: true
    num_clients: 10
    source: "ChestXray-NIHCC"
    partition_by: "patient_id"
    task: "pathology_classification"
    image_size: [224, 224]
    num_classes: 14
    test_split: 0.2
    max_samples: 20000
    download_source: "huggingface"
    raw_data_path: "/home/ubuntu/medical-imaging-fl-workflow/nih_raw_data.tar.gz"

execution:
  data_configuration: "condorio"
  compute_site: "condorpool"
  staging_site: "local"
  container: "kthare10/fl-training:latest"
  max_walltime: 3600
  gpu_per_train_job: 1
  cpu_per_train_job: 4
  mem_per_train_job: 15000
